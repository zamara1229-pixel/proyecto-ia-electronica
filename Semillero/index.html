<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Proyecto Electrónica IA</title>

<link rel="stylesheet" href="estilos.css">

<!-- Librerías necesarias -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>

</head>

<body>

<!-- ================= PORTADA ================= -->
<div id="portada">

<h1 class="titulo">🤖 Componentes Electrónicos</h1>
<p class="subtitulo">Explora, detecta y juega</p>

<div class="contenedor">

<div class="card motor">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/ESP32.jpg">
<h2>ESP32</h2>
<p>Microcontrolador con WiFi y Bluetooth.</p>
</div>

<div class="card led">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/0c/LED_5mm.jpg">
<h2>LED</h2>
<p>Emite luz cuando pasa corriente.</p>
</div>

<div class="card motor">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/DC_Motor.jpg">
<h2>Motor</h2>
<p>Convierte energía en movimiento.</p>
</div>

<div class="card resistencia">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3b/Resistor.jpg">
<h2>Resistencia</h2>
<p>Controla la corriente eléctrica.</p>
</div>

</div>

<button onclick="irModelo()">Ir al modelo IA</button>
<button onclick="irJuego()">Ir al juego</button>

</div>

<!-- ================= MODELO ================= -->
<div id="modelo" style="display:none;">

<h1 class="titulo">📷 Detector Inteligente</h1>

<button onclick="init()">Iniciar cámara</button>
<button onclick="volver()">⬅ Volver</button>

<div id="webcam-container"></div>
<div id="info"></div>

</div>

<!-- ================= JUEGO ================= -->
<div id="juego" style="display:none;">

<h1 class="titulo">🎮 Juego: Haz clic</h1>

<p>Puntos: <span id="puntos">0</span></p>

<div id="caja"></div>

<br>
<button onclick="volver()">⬅ Volver</button>

</div>

<script src="script.js"></script>

</body>
</html>
